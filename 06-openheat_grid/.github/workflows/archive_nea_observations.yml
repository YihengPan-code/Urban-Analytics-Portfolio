name: Archive NEA realtime observations

on:
  schedule:
    # Every 15 minutes. This is suitable for a prototype; for long-term storage,
    # prefer a database/object store instead of frequent CSV commits.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive NEA observations
        env:
          DATA_GOV_SG_API_KEY: ${{ secrets.DATA_GOV_SG_API_KEY }}
        run: |
          python scripts/archive_nea_observations.py --mode live --api-version v2

      - name: Commit archive update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive/nea_realtime_observations.csv
          git commit -m "Archive NEA observations" || echo "No archive changes to commit"
          git push
