    - is_retrospective_or_prospective
    - quality_flag
  optional_columns:
    - p_ge31_optional
    - p_ge33_optional
    - expected_exceedance_ge31_optional
    - prediction_interval_low_optional
    - prediction_interval_high_optional
  forbidden_columns:
