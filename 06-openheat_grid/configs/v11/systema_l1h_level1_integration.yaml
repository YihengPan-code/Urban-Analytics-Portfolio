companion:
  name: P_ge31
  definition: "Retrospective station-held-out diagnostic companion for observed WBGT >= 31 C, generated from the existing M4_inertia_ridge score with isotonic_score_only calibration."
  selected_candidate: M4_inertia_ridge + isotonic_score_only
  validation: station_grouped_loso
  brier: 0.052
  pr_auc: 0.610
  threshold: 0.309
  precision: 0.678
  recall: 0.765
  f1: 0.719
  csi: 0.561
  current_companion_definition: "P_ge31 = M4_inertia_ridge model_score calibrated with isotonic_score_only under station_grouped_loso; selected diagnostic threshold about 0.309."
  reliability_assessment: "Reliable enough for internal retrospective diagnostic use as a companion to WBGT_A; not reliable enough for official warning probability or prospective forecast claims."
  high_tail_assessment: "ge31 capture is materially improved versus the fixed score 31 threshold, but high-tail compression and station/regime caveats remain; ge31 is not fully solved and ge33 remains exploratory."
  a_l2_decision: "HOLD A-L2 until Level 1 high-tail evidence is closed and station-context residual work is explicitly opened."
  a_l1h3_decision: "OPTIONAL separate A-L1H.3 review gate only if further high-tail improvement is requested; not implemented in A-L1H.2b."

