lane: B87E_N300_surrogate_benchmark
branch: codex/b87d-b87e-n300-labels-surrogate
generated_date: 2026-05-28

scope:
  surrogate_emulator_only: true
  run_qgis: false
  run_solweig: false
  read_rasters: false
  write_rasters: false
  create_aoi_prediction: false
  create_b9_output: false
  create_wbgt_conversion: false
  create_hazard_map: false
  create_risk_map: false
  causal_feature_importance_claim: false
  random_split_headline: false
  stage_changes: false
  commit_changes: false

