feature_groups:
  b86b_baseline_features:
    - svf_or_open_sky
    - shade_fraction
    - building_density
    - building_height_or_canyon_proxy
    - road_or_hardscape_fraction
    - tree_or_gvi_fraction
    - grass_fraction
    - water_edge_or_water_fraction
    - overhead_fraction
    - impervious_or_built_fraction
    - hour_sgt
  overhead_shade:
    - overhead_fraction
    - shade_fraction
    - cu__overhead_fraction_total
    - cu__overhead_area_total_m2
    - cu__overhead_weighted_shade_area_m2
    - cu__overhead_fraction_covered_walkway
    - cu__overhead_fraction_pedestrian_bridge
    - cu__overhead_fraction_viaduct
    - cu__shade_fraction_base_v10
    - cu__shade_fraction_overhead_sens
    - cu__shade_fraction_umep_10_16_open_v10
    - cu__shade_fraction_umep_13_15_open_v10
    - hour_sgt
  built_canyon_svf:
    - svf_or_open_sky
    - building_density
    - building_height_or_canyon_proxy
    - impervious_or_built_fraction
    - cu__svf
    - cu__open_pixel_fraction
    - cu__mean_building_height
    - cu__building_height_p90
    - cu__dsm_building_height_mean_m_v10
    - cu__dsm_building_height_p90_m_v10
    - cu__svf_umep_mean_open_v10
    - cu__svf_umep_p10_open_v10
    - cu__svf_umep_p90_open_v10
    - hour_sgt
  vegetation_water:
    - tree_or_gvi_fraction
    - grass_fraction
    - water_edge_or_water_fraction
    - cu__tree_canopy_fraction
    - cu__gvi_percent
    - cu__ndvi_mean
    - cu__grass_fraction
    - cu__water_fraction
    - cu__dynamic_world_tree_fraction
    - cu__dynamic_world_grass_fraction
    - cu__dynamic_world_water_fraction
    - cu__greenery_fraction_beta
    - cu__distance_to_water
    - cu__distance_to_park
    - hour_sgt
  road_hardscape:
    - road_or_hardscape_fraction
    - impervious_or_built_fraction
    - cu__road_fraction
    - cu__impervious_fraction
    - cu__built_up_fraction
    - cu__dynamic_world_built_up_fraction
    - hour_sgt
  typology_context:
