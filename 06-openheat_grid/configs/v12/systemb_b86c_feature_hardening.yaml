b86c_version: systemb_b86c_feature_hardening_v0_1
random_seed: 42
lane: B8.6c_feature_hardening_failure_audit
branch: codex/b86c-feature-hardening-audit

expected:
  n150_cells: 150
  f5_pairwise_rows: 1500
  forcing_day_count: 2
  hours_sgt: [10, 12, 13, 15, 16]
  scenario_context: overhead_as_canopy_minus_base

inputs:
  label_source:
    f5_pairwise_delta: outputs/v12_surrogate/b8_5_f5_n150_multiforcing/b85_f5_pairwise_delta_by_cell_hour.csv
  feature_sources:
    n150_sampling_feature_matrix: outputs/v12_systemb_n150_sample_design/n150_sampling_feature_matrix.csv
    n150_candidate_universe: outputs/v12_systemb_n150_sample_design/n150_candidate_universe.csv
  f4_context:
    robust_priority_cells: outputs/v12_surrogate/b8_5_f4_n24_decision/b85_f4_robust_priority_cells.csv
    neutral_boundary_cells: outputs/v12_surrogate/b8_5_f4_n24_decision/b85_f4_neutral_boundary_cells.csv
    unstable_priority_cells: outputs/v12_surrogate/b8_5_f4_n24_decision/b85_f4_unstable_priority_cells.csv
  b86b_context:
    status: outputs/v12_surrogate/b8_6b_surrogate_promotion/B8_6B_STATUS.md
    report: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_report.md
    promotion_gate: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_promotion_gate.md
    model_card: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_model_card.md
    surrogate_dataset: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_surrogate_dataset.csv
    feature_schema: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_feature_schema.csv
    model_metrics_by_split: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_model_metrics_by_split.csv
    forcing_day_holdout_metrics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_forcing_day_holdout_metrics.csv
    cell_group_holdout_metrics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_cell_group_holdout_metrics.csv
    spatial_holdout_metrics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_spatial_holdout_metrics.csv
    typology_holdout_metrics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_typology_holdout_metrics.csv
    target_sensitivity_metrics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_target_sensitivity_metrics.csv
    anchor_cell_diagnostics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_anchor_cell_diagnostics.csv
    neutral_boundary_diagnostics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_neutral_boundary_diagnostics.csv
    unstable_cell_diagnostics: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_unstable_cell_diagnostics.csv
    worst_error_inventory: outputs/v12_surrogate/b8_6b_surrogate_promotion/b86b_worst_error_inventory.csv

targets:
  primary: delta_tmrt_p90_c
  companion:
    - delta_tmrt_mean_c
    - delta_tmrt_p50_c
    - delta_tmrt_p95_c
  neutral_delta_abs_threshold_c: 0.05
  neutral_sensitivity_thresholds_c: [0.10, 0.15]

feature_contract:
  cell_id_column: cell_id
  candidate_universe_prefix: cu__
  sampling_feature_source: n150_sampling_feature_matrix
  candidate_universe_source: n150_candidate_universe
  baseline_features:
