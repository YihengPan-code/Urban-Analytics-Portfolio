    - overhead_fraction
    - shade_fraction
    - svf_or_open_sky
    - building_density
    - building_height_or_canyon_proxy
    - road_or_hardscape_fraction
    - tree_or_gvi_fraction
    - hour_sgt

feature_sets:
  b86b_baseline_features:
    groups: [b86b_baseline_features]
    primary_evidence_allowed: true
  overhead_shade:
    groups: [overhead_shade]
    primary_evidence_allowed: true
  built_canyon_svf:
    groups: [built_canyon_svf]
    primary_evidence_allowed: true
  minimal_physics_interpretable:
    groups: [minimal_physics_interpretable]
    primary_evidence_allowed: true
  baseline_plus_interactions:
    groups: [b86b_baseline_features, interactions_safe]
    primary_evidence_allowed: true
  full_safe_compact:
    groups: [b86b_baseline_features, overhead_shade, built_canyon_svf, vegetation_water, road_hardscape, typology_context, interactions_safe]
    primary_evidence_allowed: true
  coordinate_context_diagnostic:
    groups: [b86b_baseline_features, coordinate_context_diagnostic]
    primary_evidence_allowed: false

interactions:
  overhead_fraction_x_svf_or_open_sky: [overhead_fraction, svf_or_open_sky]
  overhead_fraction_x_shade_fraction: [overhead_fraction, shade_fraction]
  shade_fraction_x_hour_sgt: [shade_fraction, hour_sgt]
  svf_or_open_sky_x_hour_sgt: [svf_or_open_sky, hour_sgt]
  building_density_x_svf_or_open_sky: [building_density, svf_or_open_sky]
  tree_or_gvi_fraction_x_shade_fraction: [tree_or_gvi_fraction, shade_fraction]

validation:
  cell_group_folds: 5
  spatial_bins: 4
  typology_min_test_cells: 5
  typology_min_train_cells: 30
  main_split_families:
    - forcing_day_holdout
    - cell_group_holdout
    - spatial_holdout
    - typology_holdout
    - hour_holdout

models:
  include:
    - dummy_mean
    - ridge
    - elasticnet
    - random_forest_regressor
    - hist_gradient_boosting_regressor
  ridge:
    alpha: 1.0
  elasticnet:
    alpha: 0.001
    l1_ratio: 0.5
  random_forest_regressor:
    n_estimators: 40
    max_depth: 6
    min_samples_leaf: 2
  hist_gradient_boosting_regressor:
    max_iter: 80
    learning_rate: 0.06
    max_leaf_nodes: 31

two_stage:
  feature_sets:
    - b86b_baseline_features
    - baseline_plus_interactions
    - full_safe_compact
  classifiers:
    - logistic_regression
    - random_forest_classifier
    - hist_gradient_boosting_classifier
  regressors:
    - ridge
    - random_forest_regressor
    - hist_gradient_boosting_regressor

oof_export:
  target: delta_tmrt_p90_c
  models:
    - ridge
    - random_forest_regressor
    - hist_gradient_boosting_regressor

promotion_gate:
  material_supporting_spearman_gain: 0.05
  material_supporting_top10_gain: 0.05
  material_supporting_mae_gain_fraction: 0.05
  weak_split_min_spearman: 0.50
  weak_split_min_top10pct: 0.40
  neutral_min_accuracy: 0.70
  anchor_max_mae: 0.35

diagnostic_cells:
  robust_priority_anchors:
    - TP_0037
    - TP_0141
    - TP_0433
    - TP_0542
    - TP_0857
  h10_caveat_hour: 10

outputs:
  out_dir: outputs/v12_surrogate/b8_6c_feature_hardening
  input_inventory: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_input_inventory.csv
  feature_candidate_inventory: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_feature_candidate_inventory.csv
  safe_feature_catalog: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_safe_feature_catalog.csv
  rejected_feature_catalog: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_rejected_feature_catalog.csv
  feature_group_registry: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_feature_group_registry.csv
  feature_set_registry: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_feature_set_registry.csv
  hardened_surrogate_dataset: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_hardened_surrogate_dataset.csv
  split_failure_summary: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_split_failure_summary.csv
  spatial_failure_inventory: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_spatial_failure_inventory.csv
  typology_failure_inventory: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_typology_failure_inventory.csv
  anchor_failure_audit: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_anchor_failure_audit.csv
  neutral_boundary_audit: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_neutral_boundary_audit.csv
  unstable_cell_audit: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_unstable_cell_audit.csv
  core_hour_h10_contrast: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_core_hour_h10_contrast.csv
  feature_set_model_metrics: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_feature_set_model_metrics.csv
  two_stage_pretest_metrics: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_two_stage_pretest_metrics.csv
  two_stage_confusion_summary: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_two_stage_confusion_summary.csv
  oof_prediction_audit: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_oof_prediction_audit.csv
  feature_upgrade_recommendation: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_feature_upgrade_recommendation.csv
  surrogate_workflow_v0_1: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_surrogate_workflow_v0_1.md
  b86d_recommendation: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_b86d_recommendation.md
  decision_matrix: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_decision_matrix.csv
  report: outputs/v12_surrogate/b8_6c_feature_hardening/b86c_report.md
  status: outputs/v12_surrogate/b8_6c_feature_hardening/B8_6C_STATUS.md
  cn_doc: docs/v12/OpenHeat_SystemB_B8_6c_feature_hardening_CN.md
