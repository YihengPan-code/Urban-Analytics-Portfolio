    - centroid_y
    - lon
    - lat
    - longitude
    - latitude

models:
  hyperparameter_grid_status: B87F2_N150_COMPATIBLE_NO_NEW_HEADLINE_FAMILIES
  featureless_mean:
    strategy: mean
  context_mean:
    groupby:
      - forcing_day_id
      - hour_sgt
  ridge:
    alpha: 1.0
  elasticnet:
    alpha: 0.001
    l1_ratio: 0.5
  random_forest:
    n_estimators: 30
    max_depth: 6
    min_samples_leaf: 2
    n_jobs: 1
  extra_trees:
    n_estimators: 30
    max_depth: null
    min_samples_leaf: 1
    n_jobs: 1
    prior_candidate_baseline: true
  hist_gradient_boosting:
    max_iter: 60
    learning_rate: 0.06
    max_leaf_nodes: 31

validation:
  group_kfold_splits: 5
  max_spatial_holdouts: 4
  spatial_min_test_cells: 5
  max_typology_holdouts: 4
  typology_min_test_cells: 5
  typology_min_train_cells: 30
  max_role_holdouts: 4
  role_min_test_cells: 5
  max_forcing_day_holdouts: 2
  max_hour_holdouts: 5
  random_test_fraction: 0.2
  random_split_diagnostic_only: true

promotion_gate:
