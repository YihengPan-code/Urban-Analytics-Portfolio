    - label_source
    - protocol_id
    - primary_role
    - secondary_roles
    - spatial_bin
    - source_closeout_status
    - design_status
    - b86g3_design_status
  forbidden_tokens:
    - tmrt
    - delta
    - wbgt
    - hazard
    - risk
