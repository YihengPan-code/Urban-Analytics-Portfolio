primary_target: delta_tmrt_p90_c
secondary_targets:
  - delta_tmrt_mean_c
  - delta_tmrt_median_c
  - delta_tmrt_p95_c
  - delta_tmrt_max_c
expected_rows: 3000
expected_cells: 300
group_column: cell_id
sample_group_column: sample_group
prior_candidate_model: extra_trees
prior_status: B87E_EXTRA_TREES_REMAINS_CANDIDATE
no_aoi_prediction: true
no_b9: true
random_state: 42

feature_policy:
  b87e_original_feature_set_name: b87e_original_main
  missing_fraction_max_pruned: 0.20
  missing_fraction_max_robust: 0.05
  correlation_abs_threshold: 0.985
  max_categorical_cardinality: 40
  context_columns:
    - forcing_day_id
    - hour_sgt
  diagnostic_only_columns:
    - sample_group
    - label_source
    - protocol_id
    - primary_role
    - secondary_roles
    - spatial_bin
    - source_closeout_status
    - design_status
    - b86g3_design_status
  forbidden_tokens:
    - tmrt
    - delta
    - wbgt
    - hazard
    - risk
    - vulnerability
    - exposure
    - observed
    - solweig
    - raster
    - tif
    - output
    - path
    - run_id
    - status
    - error
    - materialization
    - label_source
    - protocol_id
    - sample_group
    - cell_id
    - rank
    - source
    - note
    - version
    - method
  forbidden_coordinate_tokens:
    - centroid_x
    - centroid_y
    - lon
    - lat
    - longitude
    - latitude
  design_flag_tokens:
    - design
    - qa
    - candidate
    - selected
    - replacement
    - nearest
    - coverage_gap
    - sampling_boundary
  static_physical_core_tokens:
    - svf
    - shade
    - building
    - canyon
    - height
    - road
    - hardscape
    - tree
    - gvi
    - grass
    - water
    - park
    - overhead
    - impervious
    - open
    - neighbourhood
    - ped_access
    - typology

models:
  hyperparameter_grid_status: B87E_N150_COMPATIBLE_PATCH_NO_BROAD_SEARCH
  featureless_mean:
    strategy: mean
  context_mean:
    groupby:
      - forcing_day_id
      - hour_sgt
  ridge:
    alpha: 1.0
  elasticnet:
    alpha: 0.001
    l1_ratio: 0.5
  random_forest:
    n_estimators: 30
    max_depth: 6
    min_samples_leaf: 2
    n_jobs: 1
  extra_trees:
    n_estimators: 30
    max_depth: null
    min_samples_leaf: 1
    n_jobs: 1
    prior_candidate_baseline: true
  hist_gradient_boosting:
    max_iter: 60
    learning_rate: 0.06
    max_leaf_nodes: 31

validation:
  group_kfold_splits: 5
  max_spatial_holdouts: 4
  spatial_min_test_cells: 5
  max_typology_holdouts: 4
  typology_min_test_cells: 5
  typology_min_train_cells: 30
  max_role_holdouts: 4
  role_min_test_cells: 5
  random_test_fraction: 0.2
  random_split_diagnostic_only: true

prediction_output_policy:
  save_models:
    - context_mean
    - extra_trees
    - random_forest
    - hist_gradient_boosting
  save_feature_sets:
    - b87e_original_main
    - pruned_low_missing_low_corr
    - context_residual_two_stage
    - old_to_new_robust_pruned

promotion_gate:
  meaningful_group_mae_margin: 0.010
  group_mae_match_tolerance: 0.003
  old_to_new_max_degradation_vs_b87e_best: 1.05
  stable_sample_group_mae_gap_max: 0.12
  stable_forcing_day_mae_gap_max: 0.12
  stable_hour_mae_gap_max: 0.18
  min_group_spearman: 0.70
  min_old_to_new_spearman: 0.65
  require_b86g3_aoi_source_blockers_cleared: true

